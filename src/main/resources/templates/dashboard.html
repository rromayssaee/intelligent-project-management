<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard IntelliPM</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet">

    <link rel="stylesheet" href="/css/dashboard.css">
</head>

<body>

<div class="layout">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="logo">
            🚀 IntelliPM
        </div>

        <nav>

            <a href="/dashboard" class="menu-item active">
                <i class="bi bi-grid-1x2-fill"></i>
                Dashboard
            </a>

            <a href="/projects" class="menu-item">
                <i class="bi bi-folder-fill"></i>
                Projets
            </a>

            <a href="/tasks?projectId=1" class="menu-item">
                <i class="bi bi-list-check"></i>
                Tâches
            </a>

            <a href="/teams"
               id="teamsBtn"
               class="menu-item">
                <i class="bi bi-people-fill"></i>
                Équipes
            </a>

            <a href="/users"
               id="usersBtn"
               class="menu-item">
                <i class="bi bi-person-fill"></i>
                Utilisateurs
            </a>

        </nav>

        <button class="logout-btn"
                onclick="logout()">

            <i class="bi bi-box-arrow-right"></i>
            Déconnexion

        </button>

    </aside>

    <!-- Main Content -->

    <main class="content">

        <div class="header">

            <div>
                <h1>Bonjour 👋</h1>
                <p>Bienvenue sur IntelliPM</p>
            </div>

            <div class="role-badge"
                 id="userRole">
                Rôle : ...
            </div>

        </div>

        <div class="stats-grid">

            <div class="card-stat blue">

                <h3>📁 Projets</h3>

                <div id="projectsCount">0</div>

            </div>

            <div class="card-stat green">

                <h3>✅ Tâches</h3>

                <div id="tasksCount">0</div>

            </div>

            <div class="card-stat orange">

                <h3>👤 Utilisateurs</h3>

                <div id="usersCount">0</div>

            </div>

            <div class="card-stat purple">

                <h3>👥 Équipes</h3>

                <div id="teamsCount">0</div>

            </div>

        </div>

    </main>

</div>

<script>

    const role = localStorage.getItem("role");

    if(role !== "ADMIN"){
        document.getElementById("usersBtn").style.display = "none";
    }

    if(role === "MEMBRE"){
        document.getElementById("teamsBtn").style.display = "none";
    }

    const token = localStorage.getItem("token");

    if(!token){
        window.location.href = "/";
    }

    document.getElementById("userRole").innerText =
        "Rôle : " + role;

    fetch("/api/dashboard",{
        headers:{
            "Authorization":"Bearer " + token
        }
    })
        .then(response => response.json())
        .then(data => {

            document.getElementById("projectsCount").innerText =
                data.projects;

            document.getElementById("tasksCount").innerText =
                data.tasks;

            document.getElementById("usersCount").innerText =
                data.users;

            document.getElementById("teamsCount").innerText =
                data.teams;

        })
        .catch(error => {
            console.error(error);
        });

    function logout(){

        localStorage.clear();

        window.location.href="/login";

    }

</script>

</body>
</html>
