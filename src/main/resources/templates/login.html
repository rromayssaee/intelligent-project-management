<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>IntelliPM - Connexion</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" href="/css/login.css">
</head>

<body>

<div class="login-card">

    <div class="logo">
        📊
    </div>

    <h1 class="app-title">
        IntelliPM
    </h1>

    <p class="subtitle">
        Plateforme intelligente de gestion de projets
    </p>

    <form id="loginForm">

        <div class="mb-3">
            <label class="form-label">
                Email
            </label>

            <input
                    type="email"
                    id="email"
                    class="form-control"
                    placeholder="votre@email.com"
                    required>
        </div>

        <div class="mb-4">
            <label class="form-label">
                Mot de passe
            </label>

            <input
                    type="password"
                    id="password"
                    class="form-control"
                    placeholder="********"
                    required>
        </div>

        <button type="submit" class="btn-login">
            Se connecter
        </button>

        <a href="/register" class="register-link">
            Créer un compte
        </a>

    </form>

</div>

<script>

    // Rediriger vers dashboard seulement si session valide
    const token     = localStorage.getItem("token");
    const loginTime = parseInt(localStorage.getItem("loginTime") || "0");
    const SESSION_DURATION = 5 * 60 * 1000; // 5 min
    if (token && (Date.now() - loginTime) < SESSION_DURATION) {
        window.location.href = "/dashboard";
    } else {
        localStorage.clear(); // Nettoyer session expirée
    }

    document.getElementById("loginForm")
        .addEventListener("submit", async function(e){

            e.preventDefault();

            const email =
                document.getElementById("email").value;

            const password =
                document.getElementById("password").value;

            const response = await fetch(
                "/api/auth/login",
                {
                    method:"POST",

                    headers:{
                        "Content-Type":"application/json"
                    },

                    body:JSON.stringify({
                        email:email,
                        password:password
                    })
                }
            );

            if(response.ok){

                const data = await response.json();

                localStorage.setItem("token", data.token);
                localStorage.setItem("role", data.role || "MEMBRE");
                localStorage.setItem("email", data.email);
                // Stocker l'heure de connexion pour expiration
                localStorage.setItem("loginTime", Date.now().toString());

                window.location.href = "/dashboard";

            }else{

                alert(
                    "Email ou mot de passe incorrect"
                );

            }

        });

</script>

</body>
</html>
