<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Gestion des Utilisateurs</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="mb-3">Gestion des Utilisateurs</h2>

    <p id="roleInfo"
       class="alert alert-info">
    </p>

    <a href="/dashboard"
       class="btn btn-secondary mb-3">
        Retour Dashboard
    </a>

    <button class="btn btn-danger mb-3"
            onclick="logout()">
        Déconnexion
    </button>

    <button class="btn btn-success mb-3"
            onclick="showForm()">
        Ajouter Utilisateur
    </button>

    <div id="userForm"
         style="display:none;"
         class="card p-3 mb-3">

        <input type="text"
               id="nom"
               class="form-control mb-2"
               placeholder="Nom">

        <input type="email"
               id="email"
               class="form-control mb-2"
               placeholder="Email">

        <select id="role"
                class="form-control mb-2">

            <option value="ADMIN">ADMIN</option>
            <option value="CHEF_PROJET">CHEF_PROJET</option>
            <option value="MEMBRE">MEMBRE</option>

        </select>

        <button id="saveBtn"
                class="btn btn-primary"
                onclick="addUser()">
            Enregistrer
        </button>

    </div>

    <table class="table table-bordered">

        <thead>
        <tr>
            <th>ID</th>
            <th>Nom</th>
            <th>Email</th>
            <th>Rôle</th>
            <th>Équipes</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody id="usersTable"></tbody>

    </table>

</div>

<script>

    const role = localStorage.getItem("role");

    if(role !== "ADMIN"){

        alert("Accès refusé");

        window.location.href = "/dashboard";

    }
    const token = localStorage.getItem("token");

    if(!token){

        window.location.href="/";

    }



    document.getElementById("roleInfo").innerText =
        "Connecté en tant que : " + role;

    fetch("/api/users",{
        headers:{
            "Authorization":"Bearer " + token
        }
    })
        .then(response => response.json())
        .then(users => {

            let rows = "";

            users.forEach(user => {

                rows += `
            <tr>
                <td>${user.id}</td>
                <td>${user.nom}</td>
                <td>${user.email}</td>
                <td>${user.role}</td>
                <td>${user.teams ? user.teams.length : 0}</td>

                <td>

                    <button class="btn btn-warning btn-sm"
                            onclick="editUser(${user.id})">
                         Modifier
                    </button>

                    <button class="btn btn-danger btn-sm"
                            onclick="deleteUser(${user.id})">
                        Supprimer
                    </button>

                </td>

            </tr>
            `;
            });

            document.getElementById("usersTable").innerHTML = rows;

        });

    let editingUserId = null;

    function showForm(){
        document.getElementById("userForm").style.display="block";
    }

    function addUser(){

        fetch("/api/users",{

            method:"POST",

            headers:{
                "Content-Type":"application/json",
                "Authorization":"Bearer " + token
            },

            body:JSON.stringify({

                nom:document.getElementById("nom").value,
                email:document.getElementById("email").value,
                role:document.getElementById("role").value

            })

        })
            .then(response=>{

                if(response.ok){

                    alert("Utilisateur ajouté");
                    location.reload();

                }else{

                    alert("Erreur");

                }

            });

    }

    function deleteUser(id){

        if(!confirm("Supprimer cet utilisateur ?")){
            return;
        }

        fetch("/api/users/" + id,{

            method:"DELETE",

            headers:{
                "Authorization":"Bearer " + token
            }

        })
            .then(response=>{

                if(response.ok){

                    alert("Utilisateur supprimé");
                    location.reload();

                }else{

                    alert("Erreur");

                }

            });

    }

    function editUser(id){

        fetch("/api/users/" + id,{

            headers:{
                "Authorization":"Bearer " + token
            }

        })
            .then(response => response.json())
            .then(user => {

                editingUserId = id;

                document.getElementById("nom").value =
                    user.nom;

                document.getElementById("email").value =
                    user.email;

                document.getElementById("role").value =
                    user.role;

                document.getElementById("userForm").style.display =
                    "block";

                document.getElementById("saveBtn").innerText =
                    "Modifier";

                document.getElementById("saveBtn").onclick =
                    updateUser;

            });

    }

    function updateUser(){

        fetch("/api/users/" + editingUserId,{

            method:"PUT",

            headers:{
                "Content-Type":"application/json",
                "Authorization":"Bearer " + token
            },

            body:JSON.stringify({

                nom:document.getElementById("nom").value,
                email:document.getElementById("email").value,
                role:document.getElementById("role").value

            })

        })
            .then(response => {

                if(response.ok){

                    alert("Utilisateur modifié");

                    location.reload();

                }else{

                    alert("Erreur modification");

                }

            });

    }

    function logout(){

        localStorage.clear();

        window.location.href="/";

    }

</script>

</body>
</html>
