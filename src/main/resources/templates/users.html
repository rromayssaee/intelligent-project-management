<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Utilisateurs – IntelliPM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/users.css">
</head>
<body>

<!-- ===== MODAL AJOUTER ===== -->
<div class="modal-overlay" id="addModal">
    <div class="modal-card">
        <div class="modal-header-custom">
            <h5><i class="bi bi-person-plus-fill me-2"></i>Nouvel Utilisateur</h5>
            <button class="btn-close-modal" onclick="closeModal('addModal')"><i class="bi bi-x-lg"></i></button>
        </div>
        <div class="modal-body-custom">
            <div class="mb-3">
                <label class="form-label fw-semibold">Nom complet *</label>
                <input type="text" id="nom" class="form-control" placeholder="Ex: Ahmed Benali">
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Email *</label>
                <input type="email" id="email" class="form-control" placeholder="ahmed@example.com">
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Rôle *</label>
                <select id="role" class="form-select">
                    <option value="MEMBRE">Membre</option>
                    <option value="CHEF_PROJET">Chef de Projet</option>
                    <option value="ADMIN">Administrateur</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Mot de passe *</label>
                <input type="password" id="password" class="form-control" placeholder="Mot de passe">
            </div>
            <div class="d-flex gap-2 justify-content-end">
                <button class="btn btn-light" onclick="closeModal('addModal')">Annuler</button>
                <button class="btn btn-primary px-4" onclick="addUser()">
                    <i class="bi bi-save me-1"></i>Enregistrer
                </button>
            </div>
        </div>
    </div>
</div>

<!-- ===== MODAL MODIFIER ===== -->
<div class="modal-overlay" id="editModal">
    <div class="modal-card">
        <div class="modal-header-custom">
            <h5><i class="bi bi-pencil-fill me-2"></i>Modifier l'Utilisateur</h5>
            <button class="btn-close-modal" onclick="closeModal('editModal')"><i class="bi bi-x-lg"></i></button>
        </div>
        <div class="modal-body-custom">
            <input type="hidden" id="editId">
            <div class="mb-3">
                <label class="form-label fw-semibold">Nom complet *</label>
                <input type="text" id="editNom" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Email *</label>
                <input type="email" id="editEmail" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Rôle *</label>
                <select id="editRole" class="form-select">
                    <option value="MEMBRE">Membre</option>
                    <option value="CHEF_PROJET">Chef de Projet</option>
                    <option value="ADMIN">Administrateur</option>
                </select>
            </div>
            <div class="d-flex gap-2 justify-content-end">
                <button class="btn btn-light" onclick="closeModal('editModal')">Annuler</button>
                <button class="btn btn-warning px-4" onclick="updateUser()">
                    <i class="bi bi-save me-1"></i>Mettre à jour
                </button>
            </div>
        </div>
    </div>
</div>

<!-- ===== PAGE ===== -->
<div class="container py-5">

    <!-- Header -->
    <div class="page-header">
        <div>
            <h1 class="page-title">👤 Gestion des Utilisateurs</h1>
            <p class="page-subtitle">Gérez les comptes et les rôles des utilisateurs</p>
        </div>
        <div class="role-badge" id="roleInfo"></div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
        <div class="stat-box stat-total">
            <div class="stat-number" id="statTotal">0</div>
            <div class="stat-label">Total</div>
        </div>
        <div class="stat-box stat-admin">
            <div class="stat-number" id="statAdmin">0</div>
            <div class="stat-label">Admins</div>
        </div>
        <div class="stat-box stat-chef">
            <div class="stat-number" id="statChef">0</div>
            <div class="stat-label">Chefs de projet</div>
        </div>
        <div class="stat-box stat-membre">
            <div class="stat-number" id="statMembre">0</div>
            <div class="stat-label">Membres</div>
        </div>
    </div>

    <!-- Actions -->
    <div class="top-actions">
        <button class="btn btn-add btn-modern" onclick="openModal('addModal')">
            <i class="bi bi-plus-lg me-1"></i>Nouvel Utilisateur
        </button>
        <a href="/dashboard" class="btn btn-dashboard btn-modern">
            <i class="bi bi-house me-1"></i>Dashboard
        </a>
        <button class="btn btn-danger btn-modern" onclick="logout()">
            <i class="bi bi-box-arrow-right me-1"></i>Déconnexion
        </button>
    </div>

    <!-- Filtres -->
    <div class="filters-bar">
        <select id="filterRole" class="form-select filter-select" onchange="filterUsers()">
            <option value="">Tous les rôles</option>
            <option value="ADMIN">Admin</option>
            <option value="CHEF_PROJET">Chef de Projet</option>
            <option value="MEMBRE">Membre</option>
        </select>
        <input type="text" id="searchUser" class="form-control filter-select"
               placeholder="🔍 Rechercher par nom ou email..." oninput="filterUsers()">
    </div>

    <!-- Tableau -->
    <div class="users-card">
        <table class="table">
            <thead>
            <tr>
                <th>Utilisateur</th>
                <th>Email</th>
                <th>Rôle</th>
                <th>Équipes</th>
                <th>Inscription</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody id="usersTable">
            <tr>
                <td colspan="6" class="text-center py-4 text-muted">
                    <i class="bi bi-hourglass-split me-2"></i>Chargement...
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</div>

<script>
    const token = localStorage.getItem("token");
    const role  = localStorage.getItem("role");

    // Accès réservé aux ADMIN uniquement
    if (!token) { window.location.href = "/"; }
    if (role !== "ADMIN") {
        alert("Accès réservé aux administrateurs");
        window.location.href = "/dashboard";
    }

    document.getElementById("roleInfo").innerText = "Connecté : " + role;

    let allUsers = [];

    // ===== CHARGER =====
    function loadUsers() {
        fetch("/api/users", {
            headers: { "Authorization": "Bearer " + token }
        })
            .then(r => r.json())
            .then(users => {
                allUsers = users;
                updateStats(users);
                renderUsers(users);
            })
            .catch(() => {
                document.getElementById("usersTable").innerHTML =
                    `<tr><td colspan="6" class="text-center text-danger py-4">Erreur de chargement</td></tr>`;
            });
    }

    // ===== STATS =====
    function updateStats(users) {
        document.getElementById("statTotal").innerText  = users.length;
        document.getElementById("statAdmin").innerText  = users.filter(u => u.role === "ADMIN").length;
        document.getElementById("statChef").innerText   = users.filter(u => u.role === "CHEF_PROJET").length;
        document.getElementById("statMembre").innerText = users.filter(u => u.role === "MEMBRE").length;
    }

    // ===== RENDER =====
    function renderUsers(users) {
        if (users.length === 0) {
            document.getElementById("usersTable").innerHTML =
                `<tr><td colspan="6" class="text-center text-muted py-5">
                    <i class="bi bi-inbox fs-3 d-block mb-2"></i>Aucun utilisateur trouvé
                 </td></tr>`;
            return;
        }

        let rows = "";
        users.forEach(user => {
            const initiale = user.nom ? user.nom.charAt(0).toUpperCase() : "?";
            const teamsCount = user.teams ? user.teams.length : 0;

            rows += `
<tr>
    <td>
        <div class="user-info">
            <div class="user-avatar">${initiale}</div>
            <div>
                <div class="user-name">${user.nom}</div>
                <div class="user-id text-muted">#${user.id}</div>
            </div>
        </div>
    </td>
    <td><span class="user-email">${user.email}</span></td>
    <td>${badgeRole(user.role)}</td>
    <td>
        <span class="teams-count">
            <i class="bi bi-people me-1"></i>${teamsCount} équipe${teamsCount > 1 ? "s" : ""}
        </span>
    </td>
    <td><span class="text-muted small">${user.dateInscription || "—"}</span></td>
    <td>
        <button class="btn-action btn-edit" onclick="editUser(${user.id})">
            <i class="bi bi-pencil me-1"></i>Modifier
        </button>
        <button class="btn-action btn-delete" onclick="deleteUser(${user.id})">
            <i class="bi bi-trash"></i>
        </button>
    </td>
</tr>`;
        });

        document.getElementById("usersTable").innerHTML = rows;
    }

    // ===== BADGE RÔLE =====
    function badgeRole(r) {
        const map = {
            "ADMIN":       ["badge-admin",  "🔴 Admin"],
            "CHEF_PROJET": ["badge-chef",   "🟡 Chef Projet"],
            "MEMBRE":      ["badge-membre", "🟢 Membre"],
        };
        const [cls, label] = map[r] || ["badge-default", r];
        return `<span class="role-chip ${cls}">${label}</span>`;
    }

    // ===== FILTRES =====
    function filterUsers() {
        const roleFilter = document.getElementById("filterRole").value;
        const search     = document.getElementById("searchUser").value.toLowerCase();

        const filtered = allUsers.filter(u =>
            (!roleFilter || u.role === roleFilter) &&
            (!search || u.nom.toLowerCase().includes(search) || u.email.toLowerCase().includes(search))
        );

        renderUsers(filtered);
    }

    // ===== MODALS =====
    function openModal(id)  { document.getElementById(id).style.display = "flex"; }
    function closeModal(id) { document.getElementById(id).style.display = "none"; }

    document.querySelectorAll(".modal-overlay").forEach(o => {
        o.addEventListener("click", e => { if (e.target === o) closeModal(o.id); });
    });

    // ===== AJOUTER =====
    function addUser() {
        const nom      = document.getElementById("nom").value.trim();
        const email    = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        if (!nom || !email || !password) {
            alert("Tous les champs obligatoires doivent être remplis");
            return;
        }

        // Passer par l'endpoint register pour gérer le hash du mot de passe
        fetch("/api/auth/register", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({
                nom:      nom,
                email:    email,
                password: password,
                role:     document.getElementById("role").value
            })
        })
            .then(r => {
                if (r.ok) { closeModal("addModal"); loadUsers(); }
                else r.text().then(t => alert("Erreur : " + t));
            });
    }

    // ===== MODIFIER =====
    function editUser(id) {
        fetch("/api/users/" + id, {
            headers: { "Authorization": "Bearer " + token }
        })
            .then(r => r.json())
            .then(user => {
                document.getElementById("editId").value    = user.id;
                document.getElementById("editNom").value   = user.nom;
                document.getElementById("editEmail").value = user.email;
                document.getElementById("editRole").value  = user.role;
                openModal("editModal");
            });
    }

    function updateUser() {
        const id  = document.getElementById("editId").value;
        const nom = document.getElementById("editNom").value.trim();
        if (!nom) { alert("Le nom est obligatoire"); return; }

        fetch("/api/users/" + id, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({
                nom:   nom,
                email: document.getElementById("editEmail").value,
                role:  document.getElementById("editRole").value
            })
        })
            .then(r => {
                if (r.ok) { closeModal("editModal"); loadUsers(); }
                else alert("Erreur lors de la modification");
            });
    }

    // ===== SUPPRIMER =====
    function deleteUser(id) {
        if (!confirm("Supprimer cet utilisateur ?")) return;

        fetch("/api/users/" + id, {
            method: "DELETE",
            headers: { "Authorization": "Bearer " + token }
        })
            .then(r => {
                if (r.ok) loadUsers();
                else alert("Erreur lors de la suppression");
            });
    }

    // ===== DÉCONNEXION =====
    function logout() {
        localStorage.clear();
        window.location.href = "/login";
    }

    // ===== INIT =====
    loadUsers();
</script>

</body>
</html>
