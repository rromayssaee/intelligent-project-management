<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Gestion des Tâches</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet" href="/css/tasks.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="container py-5">

    <div class="page-header">

        <div>

            <h1 class="page-title">
                ✅ Gestion des Tâches
            </h1>

            <p class="page-subtitle">
                Suivez l'avancement des tâches du projet
            </p>

        </div>

        <div id="roleInfo"
             class="role-badge">
        </div>

    </div>

    <div class="top-actions">

        <button id="addTaskBtn"
                class="btn btn-add btn-modern"
                onclick="showForm()">

            <i class="fa-solid fa-plus"></i>
            Nouvelle tâche

        </button>

        <a href="/dashboard"
           class="btn btn-dashboard btn-modern">

            <i class="fa-solid fa-house"></i>
            Dashboard

        </a>

        <button class="btn btn-danger btn-modern"
                onclick="logout()">

            <i class="fa-solid fa-right-from-bracket"></i>
            Déconnexion

        </button>

    </div>

    <div id="taskForm"
         style="display:none;"
         class="task-form">

        <input type="text"
               id="titre"
               class="form-control mb-2"
               placeholder="Titre">

        <textarea id="description"
                  class="form-control mb-2"
                  placeholder="Description"></textarea>

        <input type="date"
               id="dateEcheance"
               class="form-control mb-2">

        <input type="number"
               id="estimationHeures"
               class="form-control mb-2"
               placeholder="Heures estimées">

        <select id="statut" class="form-control mb-2">
            <option value="A_FAIRE">À faire</option>
            <option value="EN_COURS">En cours</option>
            <option value="TERMINEE">Terminée</option>
        </select>

        <select id="priorite" class="form-control mb-2">
            <option value="FAIBLE">Faible</option>
            <option value="MOYENNE">Moyenne</option>
            <option value="HAUTE">Haute</option>
        </select>

        <button class="btn btn-primary"
                onclick="addTask()">
            Enregistrer
        </button>

    </div>


    <div id="editTaskForm"
         style="display:none;"
         class="task-form">

        <h4>Modifier Tâche</h4>

        <input type="hidden" id="editId">

        <input type="text"
               id="editTitre"
               class="form-control mb-2">

        <textarea id="editDescription"
                  class="form-control mb-2"></textarea>

        <input type="date"
               id="editDateEcheance"
               class="form-control mb-2">

        <input type="number"
               id="editEstimationHeures"
               class="form-control mb-2">

        <select id="editStatut" class="form-control mb-2">
            <option value="A_FAIRE">À faire</option>
            <option value="EN_COURS">En cours</option>
            <option value="TERMINEE">Terminée</option>
        </select>

        <select id="editPriorite" class="form-control mb-2">
            <option value="FAIBLE">Faible</option>
            <option value="MOYENNE">Moyenne</option>
            <option value="HAUTE">Haute</option>
        </select>

        <button class="btn btn-primary"
                onclick="updateTask()">
            Mettre à jour
        </button>

    </div>

    <div class="tasks-card">

        <table class="table">

        <thead>
        <tr>
            <th>Titre</th>
            <th>Statut</th>
            <th>Priorité</th>
            <th>Date Échéance</th>
            <th>Heures</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody id="tasksTable">

        </tbody>

    </table>
    </div>

</div>

<script>

    const role = localStorage.getItem("role");
    const token = localStorage.getItem("token");

    if(!token){
        window.location.href="/";
    }

    document.getElementById("roleInfo").innerText =
        "Connecté en tant que : " + role;

    if(role === "MEMBRE"){

        document.getElementById("addTaskBtn").style.display = "none";

    }

    const params = new URLSearchParams(window.location.search);

    const projectId = params.get("projectId");

    fetch("/api/tasks/project/" + projectId,{
        headers:{
            "Authorization":"Bearer " + token
        }
    })
        .then(response=>response.json())
        .then(tasks=>{

            let rows="";

            tasks.forEach(task=>{

                rows += `
<tr>
    <td>${task.titre}</td>
    <td>

${
                    task.statut === "TERMINEE"
                        ? '<span class="badge-status status-done">Terminée</span>'
                        : task.statut === "EN_COURS"
                            ? '<span class="badge-status status-progress">En cours</span>'
                            : '<span class="badge-status status-todo">À faire</span>'
                }

</td>
    <td>

${
                    task.priorite === "HAUTE"
                        ? '<span class="priority-high">Haute</span>'
                        : task.priorite === "MOYENNE"
                            ? '<span class="priority-medium">Moyenne</span>'
                            : '<span class="priority-low">Faible</span>'
                }

</td>
    <td>${task.dateEcheance ?? ""}</td>
    <td>${task.estimationHeures ?? ""}</td>
    <td>

    ${role !== "MEMBRE" ? `

    <button class="btn btn-warning btn-sm"
            onclick="editTask(${task.id})">
        Modifier
    </button>

    <button class="btn btn-danger btn-sm"
            onclick="deleteTask(${task.id})">
        Supprimer
    </button>

    ` : 'Lecture seule'}

    </td>
</tr>
`;

            });

            document.getElementById("tasksTable").innerHTML=rows;

        });

    function showForm(){

        document.getElementById("taskForm").style.display="block";

    }

    function addTask(){

        fetch("/api/tasks/project/" + projectId,{

            method:"POST",

            headers:{
                "Content-Type":"application/json",
                "Authorization":"Bearer " + token
            },

            body: JSON.stringify({

                titre: document.getElementById("titre").value,
                description: document.getElementById("description").value,
                dateEcheance: document.getElementById("dateEcheance").value,
                estimationHeures: document.getElementById("estimationHeures").value,
                statut: document.getElementById("statut").value,
                priorite: document.getElementById("priorite").value

            })

        })
            .then(response=>{

                if(response.ok){

                    alert("Tâche ajoutée");
                    location.reload();

                }else{

                    alert("Erreur");

                }
            });
    }

    function deleteTask(id){

        if(!confirm("Supprimer cette tâche ?")){
            return;
        }

        const token = localStorage.getItem("token");

        fetch("/api/tasks/" + id,{

            method:"DELETE",

            headers:{
                "Authorization":"Bearer " + token
            }

        })
            .then(response=>{

                if(response.ok){

                    alert("Tâche supprimée");
                    location.reload();

                }else{

                    alert("Erreur");

                }

            });
    }

    function editTask(id){

        const token = localStorage.getItem("token");

        fetch("/api/tasks/" + id,{

            headers:{
                "Authorization":"Bearer " + token
            }

        })
            .then(response=>response.json())
            .then(task=>{

                document.getElementById("editTaskForm").style.display="block";

                document.getElementById("editId").value=task.id;
                document.getElementById("editTitre").value=task.titre;
                document.getElementById("editDescription").value=task.description;
                document.getElementById("editStatut").value = task.statut;
                document.getElementById("editPriorite").value = task.priorite;
                document.getElementById("editDateEcheance").value=task.dateEcheance;
                document.getElementById("editEstimationHeures").value=task.estimationHeures;


            });

    }

    function updateTask(){

        const id = document.getElementById("editId").value;

        const token = localStorage.getItem("token");

        fetch("/api/tasks/" + id,{

            method:"PUT",

            headers:{
                "Content-Type":"application/json",
                "Authorization":"Bearer " + token
            },

            body:JSON.stringify({

                titre:document.getElementById("editTitre").value,
                description:document.getElementById("editDescription").value,
                dateEcheance:document.getElementById("editDateEcheance").value,
                estimationHeures:document.getElementById("editEstimationHeures").value,
                statut: document.getElementById("editStatut").value,
                priorite: document.getElementById("editPriorite").value

            })

        })
            .then(response=>{

                if(response.ok){

                    alert("Tâche modifiée");
                    location.reload();

                }else{

                    alert("Erreur modification");

                }

            });

    }

    function logout(){

        localStorage.clear();

        window.location.href="/";

    }

</script>

</body>
</html>
