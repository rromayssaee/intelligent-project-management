<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntelliPM — Équipes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#f4f6fb; --white:#fff; --sidebar:#1e2433;
            --accent:#2563eb; --text:#0f172a; --muted:#64748b;
            --border:#e2e8f0; --green:#16a34a; --amber:#d97706;
            --red:#dc2626; --purple:#7c3aed; --sw:252px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Plus Jakarta Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; }

        /* SIDEBAR */
        .sidebar { width:var(--sw); background:var(--sidebar); display:flex; flex-direction:column; position:fixed; top:0;left:0;bottom:0; z-index:100; }
        .logo { padding:22px 20px; display:flex; align-items:center; gap:12px; border-bottom:1px solid rgba(255,255,255,.07); }
        .logo-mark { width:36px;height:36px; background:var(--accent); border-radius:10px; display:flex;align-items:center;justify-content:center; font-size:18px;color:white;font-weight:800;flex-shrink:0; }
        .logo-text { font-size:17px;font-weight:700;color:white;letter-spacing:-.3px; }
        .logo-sub  { font-size:10px;color:rgba(255,255,255,.35);margin-top:1px; }
        .nav { padding:16px 12px; flex:1; overflow-y:auto; }
        .nav-label { font-size:10px;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.25);font-weight:600;padding:0 10px;margin:16px 0 6px; }
        .nav-label:first-child { margin-top:0; }
        .nav-link { display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;text-decoration:none;color:rgba(255,255,255,.5);font-size:13.5px;font-weight:500;transition:all .15s;margin-bottom:2px; }
        .nav-link:hover { color:white;background:rgba(255,255,255,.06); }
        .nav-link.active { color:white;background:var(--accent); }
        .nav-link .bi { font-size:15px;width:18px;text-align:center; }
        .nav-divider { height:1px;background:rgba(255,255,255,.07);margin:12px 0; }
        .sidebar-bottom { padding:14px 12px;border-top:1px solid rgba(255,255,255,.07); }
        .user-pill { display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:rgba(255,255,255,.05);margin-bottom:8px; }
        .u-avatar { width:32px;height:32px;border-radius:50%;background:var(--accent);color:white;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0; }
        .u-name { font-size:13px;font-weight:600;color:white; }
        .u-role { font-size:11px;color:rgba(255,255,255,.4); }
        .btn-logout { width:100%;padding:9px;border-radius:8px;border:none;background:rgba(220,38,38,.12);color:#fca5a5;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:.15s;font-family:inherit; }
        .btn-logout:hover { background:rgba(220,38,38,.22); }

        /* MAIN */
        .main { margin-left:var(--sw); flex:1; padding:30px 32px; }
        .topbar { display:flex;justify-content:space-between;align-items:center;margin-bottom:24px; }
        .page-title { font-size:24px;font-weight:800;letter-spacing:-.4px; }
        .page-sub { font-size:14px;color:var(--muted);margin-top:3px; }
        .btn-new { display:flex;align-items:center;gap:8px;padding:10px 18px;background:var(--accent);color:white;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s; }
        .btn-new:hover { background:#1d4ed8; }

        /* STATS */
        .stats-row { display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px; }
        .stat { background:var(--white);border:1px solid var(--border);border-radius:12px;padding:18px 20px;box-shadow:0 1px 4px rgba(0,0,0,.04); }
        .stat-num { font-size:30px;font-weight:800;letter-spacing:-1px;margin-bottom:2px; }
        .stat-label { font-size:12px;color:var(--muted);font-weight:500; }
        .s-blue   .stat-num { color:var(--accent); }
        .s-green  .stat-num { color:var(--green); }
        .s-purple .stat-num { color:var(--purple); }

        /* FILTERS */
        .filters { margin-bottom:22px; }
        .filter-input { padding:9px 14px;border:1px solid var(--border);border-radius:9px;font-size:13px;font-family:inherit;background:var(--white);color:var(--text);transition:.15s;width:100%;max-width:360px; }
        .filter-input:focus { outline:none;border-color:var(--accent); }

        /* GRID */
        .grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:18px; }

        /* TEAM CARD */
        .tcard { background:var(--white);border:1px solid var(--border);border-radius:16px;padding:22px;box-shadow:0 1px 4px rgba(0,0,0,.04);transition:box-shadow .2s,transform .2s;display:flex;flex-direction:column;gap:14px; }
        .tcard:hover { box-shadow:0 6px 24px rgba(0,0,0,.09);transform:translateY(-3px); }

        .tcard-top { display:flex;align-items:center;gap:14px; }
        .team-icon { width:46px;height:46px;background:#eff6ff;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--accent);flex-shrink:0; }
        .team-name { font-size:16px;font-weight:700; }
        .team-date { font-size:12px;color:var(--muted);margin-top:2px; }
        .tcard-desc { font-size:13px;color:var(--muted);line-height:1.5; }

        /* MEMBERS */
        .members-box { background:#f8fafc;border-radius:10px;padding:14px; }
        .members-label { font-size:12px;font-weight:600;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:6px; }
        .avatars { display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px; }
        .avatar { width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#4f46e5);color:white;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,.1); }
        .avatar-extra { background:#e2e8f0;color:#475569;font-size:11px; }
        .member-chips { display:flex;flex-wrap:wrap;gap:5px; }
        .member-chip { background:white;border:1px solid var(--border);border-radius:99px;padding:3px 10px;font-size:12px;color:var(--muted);font-weight:500; }
        .no-members { font-size:12px;color:var(--muted);font-style:italic; }

        /* ACTIONS */
        .tcard-actions { display:flex;gap:8px;flex-wrap:wrap;padding-top:12px;border-top:1px solid var(--border); }
        .act-btn { display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;font-family:inherit;transition:.15s; }
        .act-btn:hover { opacity:.85; }
        .a-members { background:#f5f3ff;color:#7c3aed; }
        .a-edit    { background:#fef3c7;color:#d97706; }
        .a-del     { background:#fee2e2;color:#dc2626; }

        /* EMPTY */
        .empty { text-align:center;padding:60px 20px;color:var(--muted);grid-column:1/-1; }
        .empty i { font-size:48px;opacity:.3;display:block;margin-bottom:14px; }
        .empty p { font-size:15px;font-weight:500; }

        /* MODAL */
        .overlay { display:none;position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:1000;align-items:center;justify-content:center;padding:20px; }
        .modal { background:var(--white);border-radius:18px;width:100%;max-width:520px;box-shadow:0 20px 60px rgba(0,0,0,.18);overflow:hidden; }
        .modal-lg { max-width:600px; }
        .modal-head { display:flex;justify-content:space-between;align-items:center;padding:20px 24px;background:#f8fafc;border-bottom:1px solid var(--border); }
        .modal-head h5 { font-size:16px;font-weight:700; }
        .btn-x { background:none;border:none;cursor:pointer;font-size:18px;color:var(--muted);padding:4px 8px;border-radius:8px; }
        .btn-x:hover { background:var(--border); }
        .modal-body { padding:24px; }
        .field { margin-bottom:16px; }
        .field label { display:block;font-size:13px;font-weight:600;margin-bottom:6px; }
        .field input,.field select,.field textarea { width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:9px;font-size:13px;font-family:inherit;color:var(--text);transition:.15s; }
        .field input:focus,.field select:focus,.field textarea:focus { outline:none;border-color:var(--accent); }
        .modal-footer { display:flex;gap:8px;justify-content:flex-end;margin-top:20px; }
        .btn-cancel { padding:9px 18px;border:1px solid var(--border);border-radius:9px;background:var(--white);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit; }
        .btn-save   { padding:9px 22px;border:none;border-radius:9px;background:var(--accent);color:white;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit; }
        .btn-update { padding:9px 22px;border:none;border-radius:9px;background:var(--amber);color:white;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit; }

        /* MEMBERS MODAL */
        .members-list { display:flex;flex-direction:column;gap:8px;max-height:220px;overflow-y:auto;margin-bottom:20px; }
        .member-row { display:flex;align-items:center;gap:12px;padding:10px 14px;background:#f8fafc;border-radius:10px; }
        .member-av { width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#4f46e5);color:white;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0; }
        .member-info { flex:1; }
        .member-name { font-size:13px;font-weight:600; }
        .member-meta { font-size:12px;color:var(--muted); }
        .btn-remove { background:#fee2e2;color:#dc2626;border:none;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:14px;transition:.15s;flex-shrink:0; }
        .btn-remove:hover { background:#dc2626;color:white; }
        .add-section { background:#f8fafc;border-radius:12px;padding:16px; }
        .add-section h6 { font-size:13px;font-weight:700;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:6px; }
        .add-row { display:flex;gap:8px; }
        .btn-add-member { padding:10px 18px;border:none;border-radius:9px;background:var(--accent);color:white;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap; }
    </style>
</head>
<body>

<!-- MODAL AJOUTER -->
<div class="overlay" id="addModal">
    <div class="modal">
        <div class="modal-head">
            <h5><i class="bi bi-plus-circle-fill" style="color:var(--accent)"></i> Nouvelle Équipe</h5>
            <button class="btn-x" onclick="closeModal('addModal')"><i class="bi bi-x-lg"></i></button>
        </div>
        <div class="modal-body">
            <div class="field"><label>Nom de l'équipe *</label><input type="text" id="nom" placeholder="Ex: Équipe Frontend"></div>
            <div class="field"><label>Description</label><textarea id="description" rows="3" placeholder="Description..."></textarea></div>
            <div class="field"><label>Date de création</label><input type="date" id="dateCreation"></div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeModal('addModal')">Annuler</button>
                <button class="btn-save" onclick="addTeam()"><i class="bi bi-save"></i> Enregistrer</button>
            </div>
        </div>
    </div>
</div>

<!-- MODAL MODIFIER -->
<div class="overlay" id="editModal">
    <div class="modal">
        <div class="modal-head">
            <h5><i class="bi bi-pencil-fill" style="color:var(--amber)"></i> Modifier l'Équipe</h5>
            <button class="btn-x" onclick="closeModal('editModal')"><i class="bi bi-x-lg"></i></button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="editId">
            <div class="field"><label>Nom *</label><input type="text" id="editNom"></div>
            <div class="field"><label>Description</label><textarea id="editDescription" rows="3"></textarea></div>
            <div class="field"><label>Date de création</label><input type="date" id="editDateCreation"></div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeModal('editModal')">Annuler</button>
                <button class="btn-update" onclick="updateTeam()"><i class="bi bi-save"></i> Mettre à jour</button>
            </div>
        </div>
    </div>
</div>

<!-- MODAL MEMBRES -->
<div class="overlay" id="membersModal">
    <div class="modal modal-lg">
        <div class="modal-head">
            <h5><i class="bi bi-people-fill" style="color:var(--purple)"></i> Membres — <span id="teamNameTitle"></span></h5>
            <button class="btn-x" onclick="closeModal('membersModal')"><i class="bi bi-x-lg"></i></button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="teamId">
            <div style="font-size:13px;font-weight:700;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:6px;">
                <i class="bi bi-person-check"></i> Membres actuels
            </div>
            <div id="currentMembers" class="members-list"></div>
            <div class="add-section">
                <h6><i class="bi bi-person-plus"></i> Ajouter un membre</h6>
                <div class="add-row">
                    <select id="userSelect" class="field" style="margin:0;flex:1;">
                        <option value="">Sélectionner un utilisateur...</option>
                    </select>
                    <button class="btn-add-member" onclick="addMember()"><i class="bi bi-plus-lg"></i> Ajouter</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- SIDEBAR -->
<aside class="sidebar">
    <div class="logo">
        <div class="logo-mark">I</div>
        <div><div class="logo-text">IntelliPM</div><div class="logo-sub">Project Management</div></div>
    </div>
    <nav class="nav">
        <div class="nav-label">Principal</div>
        <a href="/dashboard" class="nav-link"><i class="bi bi-grid-fill"></i> Dashboard</a>
        <a href="/projects"  class="nav-link"><i class="bi bi-folder-fill"></i> Projets</a>
        <a href="/teams"     class="nav-link active"><i class="bi bi-people-fill"></i> Équipes</a>
        <a href="/reports"   class="nav-link" id="reportsBtn"><i class="bi bi-bar-chart-fill"></i> Rapports</a>
        <div class="nav-divider" id="adminDivider"></div>
        <div class="nav-label" id="adminLabel">Admin</div>
        <a href="/users" class="nav-link" id="usersBtn"><i class="bi bi-person-fill"></i> Utilisateurs</a>
    </nav>
    <div class="sidebar-bottom">
        <div class="user-pill">
            <div class="u-avatar" id="uAvatar">?</div>
            <div><div class="u-name" id="uName">—</div><div class="u-role" id="uRole">—</div></div>
        </div>
        <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Déconnexion</button>
    </div>
</aside>

<!-- MAIN -->
<main class="main">
    <div class="topbar">
        <div>
            <div class="page-title">Équipes</div>
            <div class="page-sub">Organisez vos équipes et gérez leurs membres</div>
        </div>
        <button class="btn-new" id="addTeamBtn" onclick="openModal('addModal')">
            <i class="bi bi-plus-lg"></i> Nouvelle équipe
        </button>
    </div>

    <div class="stats-row">
        <div class="stat s-blue"><div class="stat-num" id="sTeams">0</div><div class="stat-label">Équipes</div></div>
        <div class="stat s-green"><div class="stat-num" id="sMembers">0</div><div class="stat-label">Total membres</div></div>
        <div class="stat s-purple"><div class="stat-num" id="sAvg">0</div><div class="stat-label">Moy. par équipe</div></div>
    </div>

    <div class="filters">
        <input class="filter-input" id="searchTeam" placeholder="🔍 Rechercher une équipe..." oninput="filterTeams()">
    </div>

    <div class="grid" id="teamsGrid">
        <div class="empty"><i class="bi bi-hourglass-split"></i><p>Chargement...</p></div>
    </div>
</main>

<script>
    const token = localStorage.getItem("token");
    const role  = localStorage.getItem("role");
    const email = localStorage.getItem("email") || "";
    const loginTime = parseInt(localStorage.getItem("loginTime") || "0");

    if (!token || (Date.now() - loginTime) > 8*60*60*1000) { localStorage.clear(); window.location.href="/login"; }

    const name = email.split("@")[0] || "Utilisateur";
    document.getElementById("uAvatar").innerText = name.charAt(0).toUpperCase();
    document.getElementById("uName").innerText   = name;
    document.getElementById("uRole").innerText   = role || "—";

    if (role !== "ADMIN") {
        document.getElementById("usersBtn").style.display     = "none";
        document.getElementById("adminLabel").style.display   = "none";
        document.getElementById("adminDivider").style.display = "none";
    }
    if (role === "MEMBRE") {
        document.getElementById("addTeamBtn").style.display = "none";
        document.getElementById("reportsBtn").style.display = "none";
    }

    let allTeams = [], allUsers = [];

    function loadUsers() {
        fetch("/api/users", { headers: { "Authorization": "Bearer " + token } })
            .then(r => r.json()).then(u => { allUsers = u; }).catch(()=>{});
    }

    function loadTeams() {
        fetch("/api/teams", { headers: { "Authorization": "Bearer " + token } })
            .then(r => r.json()).then(teams => {
            allTeams = teams;
            const total = teams.reduce((s,t) => s + (t.users?.length||0), 0);
            document.getElementById("sTeams").innerText   = teams.length;
            document.getElementById("sMembers").innerText = total;
            document.getElementById("sAvg").innerText     = teams.length ? (total/teams.length).toFixed(1) : 0;
            renderTeams(teams);
        }).catch(() => {
            document.getElementById("teamsGrid").innerHTML = `<div class="empty"><i class="bi bi-exclamation-triangle"></i><p>Erreur de chargement</p></div>`;
        });
    }

    function renderTeams(teams) {
        if (!teams.length) {
            document.getElementById("teamsGrid").innerHTML = `<div class="empty"><i class="bi bi-people"></i><p>Aucune équipe trouvée</p></div>`;
            return;
        }
        document.getElementById("teamsGrid").innerHTML = teams.map(t => {
            const members = t.users || [];
            const avatars = members.slice(0,4).map(u =>
                `<div class="avatar" title="${u.nom}">${u.nom.charAt(0).toUpperCase()}</div>`
            ).join("");
            const extra = members.length > 4 ? `<div class="avatar avatar-extra">+${members.length-4}</div>` : "";
            const chips  = members.map(u => `<span class="member-chip">${u.nom}</span>`).join("");

            return `
<div class="tcard">
    <div class="tcard-top">
        <div class="team-icon"><i class="bi bi-people-fill"></i></div>
        <div>
            <div class="team-name">${t.nom}</div>
            <div class="team-date"><i class="bi bi-calendar3"></i> ${t.dateCreation || "—"}</div>
        </div>
    </div>
    <div class="tcard-desc">${t.description || '<em style="opacity:.5">Aucune description</em>'}</div>
    <div class="members-box">
        <div class="members-label"><i class="bi bi-person"></i> ${members.length} membre${members.length>1?"s":""}</div>
        ${members.length ? `<div class="avatars">${avatars}${extra}</div><div class="member-chips">${chips}</div>` : '<div class="no-members">Aucun membre</div>'}
    </div>
    <div class="tcard-actions">
        ${role !== "MEMBRE" ? `
        <button class="act-btn a-members" onclick="openMembersModal(${t.id},'${t.nom}')"><i class="bi bi-person-plus"></i> Membres</button>
        <button class="act-btn a-edit"    onclick="editTeam(${t.id})"><i class="bi bi-pencil"></i> Modifier</button>
        <button class="act-btn a-del"     onclick="deleteTeam(${t.id})"><i class="bi bi-trash"></i></button>
        ` : '<span style="font-size:12px;color:var(--muted)">Lecture seule</span>'}
    </div>
</div>`;
        }).join("");
    }

    function filterTeams() {
        const q = document.getElementById("searchTeam").value.toLowerCase();
        renderTeams(allTeams.filter(t => t.nom.toLowerCase().includes(q) || (t.description||"").toLowerCase().includes(q)));
    }

    function openModal(id)  { document.getElementById(id).style.display="flex"; }
    function closeModal(id) { document.getElementById(id).style.display="none"; }
    document.querySelectorAll(".overlay").forEach(o => o.addEventListener("click",e=>{ if(e.target===o) closeModal(o.id); }));

    function openMembersModal(teamId, teamName) {
        document.getElementById("teamId").value        = teamId;
        document.getElementById("teamNameTitle").innerText = teamName;
        const team    = allTeams.find(t => t.id === teamId);
        const members = team?.users || [];
        const memberIds = members.map(u => u.id);

        document.getElementById("currentMembers").innerHTML = members.length
            ? members.map(u => `
                <div class="member-row">
                    <div class="member-av">${u.nom.charAt(0).toUpperCase()}</div>
                    <div class="member-info">
                        <div class="member-name">${u.nom}</div>
                        <div class="member-meta">${u.email} · ${u.role}</div>
                    </div>
                    <button class="btn-remove" onclick="removeMember(${teamId},${u.id})" title="Retirer">
                        <i class="bi bi-person-dash-fill"></i>
                    </button>
                </div>`).join("")
            : `<p style="font-size:13px;color:var(--muted);font-style:italic;padding:10px">Aucun membre dans cette équipe</p>`;

        const available = allUsers.filter(u => !memberIds.includes(u.id));
        document.getElementById("userSelect").innerHTML =
            `<option value="">Sélectionner un utilisateur...</option>` +
            available.map(u => `<option value="${u.id}">${u.nom} (${u.role})</option>`).join("");

        openModal("membersModal");
    }

    function addTeam() {
        const nom = document.getElementById("nom").value.trim();
        if (!nom) { alert("Le nom est obligatoire"); return; }
        fetch("/api/teams", {
            method:"POST", headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},
            body: JSON.stringify({ nom, description:document.getElementById("description").value, dateCreation:document.getElementById("dateCreation").value||null })
        }).then(r=>{ if(r.ok){closeModal("addModal");loadTeams();}else alert("Erreur"); });
    }

    function editTeam(id) {
        fetch("/api/teams/"+id, { headers:{"Authorization":"Bearer "+token} })
            .then(r=>r.json()).then(t=>{
            document.getElementById("editId").value           = t.id;
            document.getElementById("editNom").value          = t.nom;
            document.getElementById("editDescription").value  = t.description||"";
            document.getElementById("editDateCreation").value = t.dateCreation||"";
            openModal("editModal");
        });
    }

    function updateTeam() {
        const id=document.getElementById("editId").value, nom=document.getElementById("editNom").value.trim();
        if(!nom){alert("Le nom est obligatoire");return;}
        fetch("/api/teams/"+id, {
            method:"PUT", headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},
            body: JSON.stringify({ nom, description:document.getElementById("editDescription").value, dateCreation:document.getElementById("editDateCreation").value||null })
        }).then(r=>{ if(r.ok){closeModal("editModal");loadTeams();}else alert("Erreur"); });
    }

    function deleteTeam(id) {
        const team = allTeams.find(t=>t.id===id);
        if(team?.users?.length > 0){ alert("Impossible de supprimer une équipe avec des membres.\nRetirez d'abord tous les membres."); return; }
        if(!confirm("Supprimer cette équipe ?")) return;
        fetch("/api/teams/"+id, { method:"DELETE", headers:{"Authorization":"Bearer "+token} })
            .then(r=>{ if(r.ok) loadTeams(); else alert("Erreur"); });
    }

    function addMember() {
        const teamId=document.getElementById("teamId").value, userId=document.getElementById("userSelect").value;
        if(!userId){alert("Sélectionnez un utilisateur");return;}
        fetch(`/api/teams/${teamId}/users/${userId}`, {
            method:"PUT", headers:{"Content-Type":"application/json","Authorization":"Bearer "+token}
        }).then(r=>{ if(r.ok){closeModal("membersModal");loadTeams();}else alert("Erreur"); });
    }

    function removeMember(teamId,userId) {
        if(!confirm("Retirer ce membre ?")) return;
        fetch(`/api/teams/${teamId}/users/${userId}`, {
            method:"DELETE", headers:{"Authorization":"Bearer "+token}
        }).then(r=>{ if(r.ok){closeModal("membersModal");loadTeams();}else alert("Erreur"); });
    }

    function logout() { localStorage.clear(); window.location.href="/login"; }

    loadUsers();
    loadTeams();
</script>
</body>
</html>
