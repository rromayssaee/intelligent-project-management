<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Équipes – IntelliPM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/teams.css">
</head>
<body>

<!-- ===== MODAL AJOUTER ÉQUIPE ===== -->
<div class="modal-overlay" id="addModal">
    <div class="modal-card">
        <div class="modal-header-custom">
            <h5><i class="bi bi-plus-circle-fill me-2"></i>Nouvelle Équipe</h5>
            <button class="btn-close-modal" onclick="closeModal('addModal')"><i class="bi bi-x-lg"></i></button>
        </div>
        <div class="modal-body-custom">
            <div class="mb-3">
                <label class="form-label fw-semibold">Nom de l'équipe *</label>
                <input type="text" id="nom" class="form-control" placeholder="Ex: Équipe Frontend">
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Description</label>
                <textarea id="description" class="form-control" rows="3" placeholder="Description de l'équipe..."></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Date de création</label>
                <input type="date" id="dateCreation" class="form-control">
            </div>
            <div class="d-flex gap-2 justify-content-end">
                <button class="btn btn-light" onclick="closeModal('addModal')">Annuler</button>
                <button class="btn btn-primary px-4" onclick="addTeam()">
                    <i class="bi bi-save me-1"></i>Enregistrer
                </button>
            </div>
        </div>
    </div>
</div>

<!-- ===== MODAL MODIFIER ÉQUIPE ===== -->
<div class="modal-overlay" id="editModal">
    <div class="modal-card">
        <div class="modal-header-custom">
            <h5><i class="bi bi-pencil-fill me-2"></i>Modifier l'Équipe</h5>
            <button class="btn-close-modal" onclick="closeModal('editModal')"><i class="bi bi-x-lg"></i></button>
        </div>
        <div class="modal-body-custom">
            <input type="hidden" id="editId">
            <div class="mb-3">
                <label class="form-label fw-semibold">Nom de l'équipe *</label>
                <input type="text" id="editNom" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Description</label>
                <textarea id="editDescription" class="form-control" rows="3"></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Date de création</label>
                <input type="date" id="editDateCreation" class="form-control">
            </div>
            <div class="d-flex gap-2 justify-content-end">
                <button class="btn btn-light" onclick="closeModal('editModal')">Annuler</button>
                <button class="btn btn-warning px-4" onclick="updateTeam()">
                    <i class="bi bi-save me-1"></i>Mettre à jour
                </button>
            </div>
        </div>
    </div>
</div>

<!-- ===== MODAL GÉRER MEMBRES ===== -->
<div class="modal-overlay" id="membersModal">
    <div class="modal-card modal-large">
        <div class="modal-header-custom">
            <h5><i class="bi bi-people-fill me-2"></i>Membres de l'équipe : <span id="teamNameTitle"></span></h5>
            <button class="btn-close-modal" onclick="closeModal('membersModal')"><i class="bi bi-x-lg"></i></button>
        </div>
        <div class="modal-body-custom">
            <input type="hidden" id="teamId">

            <!-- Membres actuels -->
            <div class="mb-4">
                <h6 class="fw-bold text-muted mb-3">
                    <i class="bi bi-person-check me-1"></i>Membres actuels
                </h6>
                <div id="currentMembers" class="members-list">
                    <p class="text-muted">Chargement...</p>
                </div>
            </div>

            <!-- Ajouter un membre -->
            <div class="add-member-section">
                <h6 class="fw-bold text-muted mb-3">
                    <i class="bi bi-person-plus me-1"></i>Ajouter un membre
                </h6>
                <div class="d-flex gap-2">
                    <select id="userSelect" class="form-select">
                        <option value="">Sélectionner un utilisateur...</option>
                    </select>
                    <button class="btn btn-primary px-4" onclick="addMember()">
                        <i class="bi bi-plus-lg me-1"></i>Ajouter
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ===== PAGE ===== -->
<div class="container py-5">

    <!-- Header -->
    <div class="page-header">
        <div>
            <h1 class="page-title">👥 Gestion des Équipes</h1>
            <p class="page-subtitle">Organisez vos équipes et gérez leurs membres</p>
        </div>
        <div class="role-badge" id="roleInfo"></div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
        <div class="stat-box stat-total">
            <div class="stat-number" id="statTotal">0</div>
            <div class="stat-label">Équipes</div>
        </div>
        <div class="stat-box stat-members">
            <div class="stat-number" id="statMembers">0</div>
            <div class="stat-label">Total membres</div>
        </div>
        <div class="stat-box stat-avg">
            <div class="stat-number" id="statAvg">0</div>
            <div class="stat-label">Moy. par équipe</div>
        </div>
    </div>

    <!-- Actions -->
    <div class="top-actions">
        <button id="addTeamBtn" class="btn btn-add btn-modern" onclick="openModal('addModal')">
            <i class="bi bi-plus-lg me-1"></i>Nouvelle Équipe
        </button>
        <a href="/dashboard" class="btn btn-dashboard btn-modern">
            <i class="bi bi-house me-1"></i>Dashboard
        </a>
        <button class="btn btn-danger btn-modern" onclick="logout()">
            <i class="bi bi-box-arrow-right me-1"></i>Déconnexion
        </button>
    </div>

    <!-- Recherche -->
    <div class="filters-bar">
        <input type="text" id="searchTeam" class="form-control filter-input"
               placeholder="🔍 Rechercher une équipe..." oninput="filterTeams()">
    </div>

    <!-- Cards équipes -->
    <div id="teamsGrid" class="teams-grid">
        <div class="text-center text-muted py-5">
            <i class="bi bi-hourglass-split fs-3 d-block mb-2"></i>Chargement...
        </div>
    </div>

</div>

<script>
    const token = localStorage.getItem("token");
    const role  = localStorage.getItem("role");

    if (!token) window.location.href = "/";

    document.getElementById("roleInfo").innerText = "Connecté : " + role;

    if (role === "MEMBRE") {
        document.getElementById("addTeamBtn").style.display = "none";
    }

    let allTeams = [];
    let allUsers = [];

    // ===== CHARGER ÉQUIPES =====
    function loadTeams() {
        fetch("/api/teams", {
            headers: { "Authorization": "Bearer " + token }
        })
            .then(r => r.json())
            .then(teams => {
                allTeams = teams;
                updateStats(teams);
                renderTeams(teams);
            })
            .catch(() => {
                document.getElementById("teamsGrid").innerHTML =
                    `<div class="text-center text-danger py-5">Erreur de chargement</div>`;
            });
    }

    // ===== CHARGER UTILISATEURS =====
    function loadUsers() {
        fetch("/api/users", {
            headers: { "Authorization": "Bearer " + token }
        })
            .then(r => r.json())
            .then(users => {
                allUsers = users;
            })
            .catch(() => { allUsers = []; });
    }

    // ===== STATS =====
    function updateStats(teams) {
        const totalMembers = teams.reduce((sum, t) => sum + (t.users ? t.users.length : 0), 0);
        document.getElementById("statTotal").innerText   = teams.length;
        document.getElementById("statMembers").innerText = totalMembers;
        document.getElementById("statAvg").innerText     =
            teams.length > 0 ? (totalMembers / teams.length).toFixed(1) : 0;
    }

    // ===== RENDER CARDS =====
    function renderTeams(teams) {
        if (teams.length === 0) {
            document.getElementById("teamsGrid").innerHTML =
                `<div class="text-center text-muted py-5 w-100">
                    <i class="bi bi-people fs-2 d-block mb-2"></i>
                    Aucune équipe trouvée
                 </div>`;
            return;
        }

        let html = "";
        teams.forEach(team => {
            const members = team.users || [];
            const avatars = members.slice(0, 4).map(u =>
                `<div class="member-avatar" title="${u.nom}">${u.nom.charAt(0).toUpperCase()}</div>`
            ).join("");
            const extra = members.length > 4
                ? `<div class="member-avatar member-extra">+${members.length - 4}</div>`
                : "";

            html += `
<div class="team-card">
    <div class="team-card-header">
        <div class="team-icon"><i class="bi bi-people-fill"></i></div>
        <div class="team-info">
            <div class="team-name">${team.nom}</div>
            <div class="team-date">
                <i class="bi bi-calendar3 me-1"></i>
                ${team.dateCreation || "Date non définie"}
            </div>
        </div>
    </div>

    <p class="team-description">
        ${team.description || '<span class="text-muted fst-italic">Aucune description</span>'}
    </p>

    <div class="members-section">
        <div class="members-label">
            <i class="bi bi-person me-1"></i>
            ${members.length} membre${members.length > 1 ? "s" : ""}
        </div>
        <div class="members-avatars">
            ${avatars}${extra}
        </div>
        ${members.length > 0 ? `
        <div class="members-names">
            ${members.map(u => `<span class="member-chip">${u.nom}</span>`).join("")}
        </div>` : ''}
    </div>

    <div class="team-actions">
        ${role !== "MEMBRE" ? `
        <button class="btn-action btn-members" onclick="openMembersModal(${team.id}, '${team.nom}')">
            <i class="bi bi-person-plus me-1"></i>Membres
        </button>
        <button class="btn-action btn-edit" onclick="editTeam(${team.id})">
            <i class="bi bi-pencil me-1"></i>Modifier
        </button>
        <button class="btn-action btn-delete" onclick="deleteTeam(${team.id})">
            <i class="bi bi-trash"></i>
        </button>
        ` : '<span class="badge bg-secondary">Lecture seule</span>'}
    </div>
</div>`;
        });

        document.getElementById("teamsGrid").innerHTML = html;
    }

    // ===== FILTRES =====
    function filterTeams() {
        const search = document.getElementById("searchTeam").value.toLowerCase();
        const filtered = allTeams.filter(t =>
            t.nom.toLowerCase().includes(search) ||
            (t.description && t.description.toLowerCase().includes(search))
        );
        renderTeams(filtered);
    }

    // ===== MODALS =====
    function openModal(id)  { document.getElementById(id).style.display = "flex"; }
    function closeModal(id) { document.getElementById(id).style.display = "none"; }

    document.querySelectorAll(".modal-overlay").forEach(o => {
        o.addEventListener("click", e => { if (e.target === o) closeModal(o.id); });
    });

    // ===== MODAL MEMBRES =====
    function openMembersModal(teamId, teamName) {
        document.getElementById("teamId").value     = teamId;
        document.getElementById("teamNameTitle").innerText = teamName;

        // Afficher membres actuels
        const team    = allTeams.find(t => t.id === teamId);
        const members = team ? (team.users || []) : [];

        if (members.length === 0) {
            document.getElementById("currentMembers").innerHTML =
                `<p class="text-muted fst-italic">Aucun membre dans cette équipe</p>`;
        } else {
            document.getElementById("currentMembers").innerHTML = members.map(u => `
                <div class="member-row">
                    <div class="member-avatar-sm">${u.nom.charAt(0).toUpperCase()}</div>
                    <div>
                        <div class="fw-semibold">${u.nom}</div>
                        <div class="text-muted small">${u.email} · ${u.role}</div>
                    </div>
                </div>
            `).join("");
        }

        // Remplir select utilisateurs
        const select  = document.getElementById("userSelect");
        const memberIds = members.map(u => u.id);
        const available = allUsers.filter(u => !memberIds.includes(u.id));

        select.innerHTML = `<option value="">Sélectionner un utilisateur...</option>` +
            available.map(u =>
                `<option value="${u.id}">${u.nom} (${u.role})</option>`
            ).join("");

        openModal("membersModal");
    }

    // ===== AJOUTER ÉQUIPE =====
    function addTeam() {
        const nom = document.getElementById("nom").value.trim();
        if (!nom) { alert("Le nom est obligatoire"); return; }

        fetch("/api/teams", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({
                nom:          nom,
                description:  document.getElementById("description").value,
                dateCreation: document.getElementById("dateCreation").value || null
            })
        })
            .then(r => {
                if (r.ok) { closeModal("addModal"); loadTeams(); }
                else alert("Erreur lors de l'ajout");
            });
    }

    // ===== MODIFIER ÉQUIPE =====
    function editTeam(id) {
        fetch("/api/teams/" + id, {
            headers: { "Authorization": "Bearer " + token }
        })
            .then(r => r.json())
            .then(team => {
                document.getElementById("editId").value           = team.id;
                document.getElementById("editNom").value          = team.nom;
                document.getElementById("editDescription").value  = team.description || "";
                document.getElementById("editDateCreation").value = team.dateCreation || "";
                openModal("editModal");
            });
    }

    function updateTeam() {
        const id  = document.getElementById("editId").value;
        const nom = document.getElementById("editNom").value.trim();
        if (!nom) { alert("Le nom est obligatoire"); return; }

        fetch("/api/teams/" + id, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({
                nom:          nom,
                description:  document.getElementById("editDescription").value,
                dateCreation: document.getElementById("editDateCreation").value || null
            })
        })
            .then(r => {
                if (r.ok) { closeModal("editModal"); loadTeams(); }
                else alert("Erreur lors de la modification");
            });
    }

    // ===== SUPPRIMER =====
    function deleteTeam(id) {
        if (!confirm("Supprimer cette équipe ?")) return;

        fetch("/api/teams/" + id, {
            method: "DELETE",
            headers: { "Authorization": "Bearer " + token }
        })
            .then(r => {
                if (r.ok) loadTeams();
                else alert("Erreur lors de la suppression");
            });
    }

    // ===== AJOUTER MEMBRE =====
    function addMember() {
        const teamId = document.getElementById("teamId").value;
        const userId = document.getElementById("userSelect").value;

        if (!userId) { alert("Sélectionnez un utilisateur"); return; }

        fetch(`/api/teams/${teamId}/users/${userId}`, {
            method: "PUT",
            headers: { "Authorization": "Bearer " + token }
        })
            .then(r => {
                if (r.ok) {
                    closeModal("membersModal");
                    loadTeams();
                } else {
                    alert("Erreur lors de l'ajout du membre");
                }
            });
    }

    // ===== DÉCONNEXION =====
    function logout() {
        localStorage.clear();
        window.location.href = "/login";
    }

    // ===== INIT =====
    loadUsers();
    loadTeams();
</script>

</body>
</html>
