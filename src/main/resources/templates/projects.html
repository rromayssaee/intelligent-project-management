<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Projets – IntelliPM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/projects.css">
</head>
<body>

<!-- ===== MODAL AJOUTER ===== -->
<div class="modal-overlay" id="addModal">
    <div class="modal-card">
        <div class="modal-header-custom">
            <h5><i class="bi bi-plus-circle-fill me-2"></i>Nouveau Projet</h5>
            <button class="btn-close-modal" onclick="closeModal('addModal')"><i class="bi bi-x-lg"></i></button>
        </div>
        <div class="modal-body-custom">
            <div class="mb-3">
                <label class="form-label fw-semibold">Titre *</label>
                <input type="text" id="titre" class="form-control" placeholder="Nom du projet">
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Description</label>
                <textarea id="description" class="form-control" rows="3" placeholder="Description du projet..."></textarea>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Statut</label>
                    <select id="statut" class="form-select">
                        <option value="EN_COURS">En cours</option>
                        <option value="PLANIFIE">Planifié</option>
                        <option value="TERMINE">Terminé</option>
                        <option value="SUSPENDU">Suspendu</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Priorité</label>
                    <select id="priorite" class="form-select">
                        <option value="MOYENNE">Moyenne</option>
                        <option value="HAUTE">Haute</option>
                        <option value="FAIBLE">Faible</option>
                    </select>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Date début *</label>
                    <input type="date" id="dateDebut" class="form-control">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Date fin *</label>
                    <input type="date" id="dateFin" class="form-control">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Équipe associée</label>
                <select id="teamId" class="form-select">
                    <option value="">-- Aucune équipe --</option>
                </select>
            </div>
            <div class="d-flex gap-2 justify-content-end">
                <button class="btn btn-light" onclick="closeModal('addModal')">Annuler</button>
                <button class="btn btn-primary px-4" onclick="addProject()">
                    <i class="bi bi-save me-1"></i>Enregistrer
                </button>
            </div>
        </div>
    </div>
</div>

<!-- ===== MODAL MODIFIER ===== -->
<div class="modal-overlay" id="editModal">
    <div class="modal-card">
        <div class="modal-header-custom">
            <h5><i class="bi bi-pencil-fill me-2"></i>Modifier le Projet</h5>
            <button class="btn-close-modal" onclick="closeModal('editModal')"><i class="bi bi-x-lg"></i></button>
        </div>
        <div class="modal-body-custom">
            <input type="hidden" id="editId">
            <div class="mb-3">
                <label class="form-label fw-semibold">Titre *</label>
                <input type="text" id="editTitre" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Description</label>
                <textarea id="editDescription" class="form-control" rows="3"></textarea>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Statut</label>
                    <select id="editStatut" class="form-select">
                        <option value="EN_COURS">En cours</option>
                        <option value="PLANIFIE">Planifié</option>
                        <option value="TERMINE">Terminé</option>
                        <option value="SUSPENDU">Suspendu</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Priorité</label>
                    <select id="editPriorite" class="form-select">
                        <option value="MOYENNE">Moyenne</option>
                        <option value="HAUTE">Haute</option>
                        <option value="FAIBLE">Faible</option>
                    </select>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Date début *</label>
                    <input type="date" id="editDateDebut" class="form-control">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Date fin *</label>
                    <input type="date" id="editDateFin" class="form-control">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Équipe associée</label>
                <select id="editTeamId" class="form-select">
                    <option value="">-- Aucune équipe --</option>
                </select>
            </div>
            <div class="d-flex gap-2 justify-content-end">
                <button class="btn btn-light" onclick="closeModal('editModal')">Annuler</button>
                <button class="btn btn-warning px-4" onclick="updateProject()">
                    <i class="bi bi-save me-1"></i>Mettre à jour
                </button>
            </div>
        </div>
    </div>
</div>

<!-- ===== PAGE ===== -->
<div class="container py-5">

    <!-- Header -->
    <div class="page-header">
        <div>
            <h1 class="page-title">📁 Gestion des Projets</h1>
            <p class="page-subtitle">Gérez vos projets et suivez leur avancement</p>
        </div>
        <div class="role-badge" id="roleInfo"></div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
        <div class="stat-box stat-total">
            <div class="stat-number" id="statTotal">0</div>
            <div class="stat-label">Total</div>
        </div>
        <div class="stat-box stat-progress">
            <div class="stat-number" id="statEnCours">0</div>
            <div class="stat-label">En cours</div>
        </div>
        <div class="stat-box stat-done">
            <div class="stat-number" id="statTermines">0</div>
            <div class="stat-label">Terminés</div>
        </div>
        <div class="stat-box stat-planned">
            <div class="stat-number" id="statPlanifies">0</div>
            <div class="stat-label">Planifiés</div>
        </div>
    </div>

    <!-- Actions -->
    <div class="top-actions">
        <button id="addProjectBtn" class="btn btn-add btn-modern" onclick="openModal('addModal')">
            <i class="bi bi-plus-lg me-1"></i>Nouveau Projet
        </button>
        <a href="/dashboard" class="btn btn-dashboard btn-modern">
            <i class="bi bi-house me-1"></i>Dashboard
        </a>
        <button class="btn btn-danger btn-modern" onclick="logout()">
            <i class="bi bi-box-arrow-right me-1"></i>Déconnexion
        </button>
    </div>

    <!-- Filtres -->
    <div class="filters-bar">
        <select id="filterStatut" class="form-select filter-select" onchange="filterProjects()">
            <option value="">Tous les statuts</option>
            <option value="EN_COURS">En cours</option>
            <option value="PLANIFIE">Planifié</option>
            <option value="TERMINE">Terminé</option>
            <option value="SUSPENDU">Suspendu</option>
        </select>
        <select id="filterPriorite" class="form-select filter-select" onchange="filterProjects()">
            <option value="">Toutes les priorités</option>
            <option value="HAUTE">Haute</option>
            <option value="MOYENNE">Moyenne</option>
            <option value="FAIBLE">Faible</option>
        </select>
        <input type="text" id="searchProject" class="form-control filter-select"
               placeholder="🔍 Rechercher un projet..." oninput="filterProjects()">
    </div>

    <!-- Cards projets -->
    <div id="projectsGrid" class="projects-grid">
        <div class="text-center text-muted py-5">
            <i class="bi bi-hourglass-split fs-3 d-block mb-2"></i>Chargement...
        </div>
    </div>

</div>

<script>
    const token = localStorage.getItem("token");
    const role  = localStorage.getItem("role");

    if (!token) window.location.href = "/login";

    document.getElementById("roleInfo").innerText = "Connecté : " + role;

    if (role === "MEMBRE") {
        document.getElementById("addProjectBtn").style.display = "none";
    }

    let allProjects = [];
    let allTeams    = [];

    // ===== CHARGER ÉQUIPES =====
    function loadTeams() {
        fetch("/api/teams", {
            headers: { "Authorization": "Bearer " + token }
        })
            .then(r => r.json())
            .then(teams => {
                allTeams = teams;
                const options = `<option value="">-- Aucune équipe --</option>` +
                    teams.map(t => `<option value="${t.id}">${t.nom}</option>`).join("");
                document.getElementById("teamId").innerHTML     = options;
                document.getElementById("editTeamId").innerHTML = options;
            })
            .catch(() => {});
    }

    // ===== CHARGER =====
    function loadProjects() {
        fetch("/api/projects", {
            headers: { "Authorization": "Bearer " + token }
        })
            .then(r => r.json())
            .then(projects => {
                allProjects = projects;
                updateStats(projects);
                renderProjects(projects);
            })
            .catch(() => {
                document.getElementById("projectsGrid").innerHTML =
                    `<div class="text-center text-danger py-5">Erreur de chargement</div>`;
            });
    }

    // ===== STATS =====
    function updateStats(projects) {
        document.getElementById("statTotal").innerText    = projects.length;
        document.getElementById("statEnCours").innerText  = projects.filter(p => p.statut === "EN_COURS").length;
        document.getElementById("statTermines").innerText = projects.filter(p => p.statut === "TERMINE").length;
        document.getElementById("statPlanifies").innerText = projects.filter(p => p.statut === "PLANIFIE").length;
    }

    // ===== RENDER CARDS =====
    function renderProjects(projects) {
        if (projects.length === 0) {
            document.getElementById("projectsGrid").innerHTML =
                `<div class="text-center text-muted py-5 w-100">
                    <i class="bi bi-folder2-open fs-2 d-block mb-2"></i>
                    Aucun projet trouvé
                 </div>`;
            return;
        }

        const today = new Date().toISOString().split("T")[0];
        let html = "";

        projects.forEach(p => {
            const isLate = p.dateFin && p.dateFin < today && p.statut !== "TERMINE";
            const tasksCount = p.tasks ? p.tasks.length : 0;
            const doneCount  = p.tasks ? p.tasks.filter(t => t.statut === "TERMINEE").length : 0;
            const progress   = tasksCount > 0 ? Math.round((doneCount / tasksCount) * 100) : 0;

            html += `
<div class="project-card ${isLate ? 'card-late' : ''}">
    <div class="project-card-header">
        <div class="project-title">${p.titre}</div>
        <div class="project-badges">
            ${badgeStatut(p.statut)}
            ${badgePriorite(p.priorite)}
        </div>
    </div>

    <p class="project-description">${p.description || '<span class="text-muted fst-italic">Aucune description</span>'}</p>

    <div class="project-dates">
        <span><i class="bi bi-calendar-event me-1"></i>${p.dateDebut || "—"}</span>
        <i class="bi bi-arrow-right mx-2 text-muted"></i>
        <span class="${isLate ? 'text-danger fw-bold' : ''}">${p.dateFin || "—"}${isLate ? ' <i class="bi bi-alarm"></i>' : ''}</span>
    </div>

    ${p.team ? `
    <div class="team-badge-project">
        <i class="bi bi-people-fill me-1"></i>${p.team.nom}
    </div>` : ''}

    <div class="progress-section">
        <div class="d-flex justify-content-between mb-1">
            <small class="text-muted">Avancement</small>
            <small class="fw-bold">${progress}%</small>
        </div>
        <div class="progress" style="height:8px;border-radius:999px;">
            <div class="progress-bar ${progress === 100 ? 'bg-success' : 'bg-primary'}"
                 style="width:${progress}%;border-radius:999px;"></div>
        </div>
        <small class="text-muted">${doneCount}/${tasksCount} tâches terminées</small>
    </div>

    <div class="project-actions">
        <a href="/tasks?projectId=${p.id}" class="btn-action btn-tasks">
            <i class="bi bi-list-check me-1"></i>Tâches
        </a>
        ${role !== "MEMBRE" ? `
        <button class="btn-action btn-edit" onclick="editProject(${p.id})">
            <i class="bi bi-pencil me-1"></i>Modifier
        </button>
        <button class="btn-action btn-pdf" onclick="downloadPdf(${p.id})">
            <i class="bi bi-file-pdf me-1"></i>PDF
        </button>
        <button class="btn-action btn-delete" onclick="deleteProject(${p.id})">
            <i class="bi bi-trash"></i>
        </button>
        ` : ''}
    </div>
</div>`;
        });

        document.getElementById("projectsGrid").innerHTML = html;
    }

    // ===== BADGES =====
    function badgeStatut(s) {
        const map = {
            "EN_COURS": ["badge-progress", "En cours"],
            "PLANIFIE":  ["badge-planned",  "Planifié"],
            "TERMINE":   ["badge-done",     "Terminé"],
            "SUSPENDU":  ["badge-suspended","Suspendu"],
        };
        const [cls, label] = map[s] || ["badge-default", s || "—"];
        return `<span class="proj-badge ${cls}">${label}</span>`;
    }

    function badgePriorite(p) {
        const map = {
            "HAUTE":   ["badge-high",   "🔴 Haute"],
            "MOYENNE": ["badge-medium", "🟡 Moyenne"],
            "FAIBLE":  ["badge-low",    "🟢 Faible"],
        };
        const [cls, label] = map[p] || ["badge-default", p || "—"];
        return `<span class="proj-badge ${cls}">${label}</span>`;
    }

    // ===== FILTRES =====
    function filterProjects() {
        const statut   = document.getElementById("filterStatut").value;
        const priorite = document.getElementById("filterPriorite").value;
        const search   = document.getElementById("searchProject").value.toLowerCase();

        const filtered = allProjects.filter(p =>
            (!statut   || p.statut   === statut)   &&
            (!priorite || p.priorite === priorite) &&
            (!search   || p.titre.toLowerCase().includes(search))
        );

        renderProjects(filtered);
    }

    // ===== MODALS =====
    function openModal(id)  { document.getElementById(id).style.display = "flex"; }
    function closeModal(id) { document.getElementById(id).style.display = "none"; }

    document.querySelectorAll(".modal-overlay").forEach(o => {
        o.addEventListener("click", e => { if (e.target === o) closeModal(o.id); });
    });

    // ===== AJOUTER =====
    function addProject() {
        const titre = document.getElementById("titre").value.trim();
        if (!titre) { alert("Le titre est obligatoire"); return; }

        fetch("/api/projects", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({
                titre:       titre,
                description: document.getElementById("description").value,
                statut:      document.getElementById("statut").value,
                priorite:    document.getElementById("priorite").value,
                dateDebut:   document.getElementById("dateDebut").value || null,
                dateFin:     document.getElementById("dateFin").value   || null,
                team:        document.getElementById("teamId").value
                    ? { id: parseInt(document.getElementById("teamId").value) }
                    : null
            })
        })
            .then(r => {
                if (r.ok) { closeModal("addModal"); loadProjects(); }
                else alert("Erreur lors de l'ajout");
            });
    }

    // ===== MODIFIER =====
    function editProject(id) {
        fetch("/api/projects/" + id, {
            headers: { "Authorization": "Bearer " + token }
        })
            .then(r => r.json())
            .then(p => {
                document.getElementById("editId").value          = p.id;
                document.getElementById("editTitre").value       = p.titre;
                document.getElementById("editDescription").value = p.description || "";
                document.getElementById("editStatut").value      = p.statut      || "EN_COURS";
                document.getElementById("editPriorite").value    = p.priorite    || "MOYENNE";
                document.getElementById("editDateDebut").value   = p.dateDebut   || "";
                document.getElementById("editDateFin").value     = p.dateFin     || "";
                document.getElementById("editTeamId").value      = p.team ? p.team.id : "";
                openModal("editModal");
            });
    }

    function updateProject() {
        const id    = document.getElementById("editId").value;
        const titre = document.getElementById("editTitre").value.trim();
        if (!titre) { alert("Le titre est obligatoire"); return; }

        fetch("/api/projects/" + id, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({
                titre:       titre,
                description: document.getElementById("editDescription").value,
                statut:      document.getElementById("editStatut").value,
                priorite:    document.getElementById("editPriorite").value,
                dateDebut:   document.getElementById("editDateDebut").value || null,
                dateFin:     document.getElementById("editDateFin").value   || null,
                team:        document.getElementById("editTeamId").value
                    ? { id: parseInt(document.getElementById("editTeamId").value) }
                    : null
            })
        })
            .then(r => {
                if (r.ok) { closeModal("editModal"); loadProjects(); }
                else alert("Erreur lors de la modification");
            });
    }

    // ===== SUPPRIMER =====
    function deleteProject(id) {
        if (!confirm("Supprimer ce projet et toutes ses tâches ?")) return;

        fetch("/api/projects/" + id, {
            method: "DELETE",
            headers: { "Authorization": "Bearer " + token }
        })
            .then(r => {
                if (r.ok) loadProjects();
                else alert("Erreur lors de la suppression");
            });
    }

    // ===== PDF =====
    function downloadPdf(projectId) {
        fetch(`/api/reports/project/${projectId}/pdf`, {
            headers: { "Authorization": "Bearer " + token }
        })
            .then(r => r.blob())
            .then(blob => {
                const url = window.URL.createObjectURL(blob);
                const a   = document.createElement("a");
                a.href     = url;
                a.download = `rapport-projet-${projectId}.pdf`;
                document.body.appendChild(a);
                a.click();
                a.remove();
            });
    }

    // ===== DECONNEXION =====
    function logout() {
        localStorage.clear();
        window.location.href = "/login";
    }

    // ===== INIT =====
    loadTeams();
    loadProjects();
</script>

</body>
</html>
