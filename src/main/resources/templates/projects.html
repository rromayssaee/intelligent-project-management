<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Gestion des Projets</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" href="/css/projects.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="container py-5">

    <div class="page-header">

        <div>

            <h1 class="page-title">
                📁 Gestion des Projets
            </h1>

            <p class="page-subtitle">
                Gérez vos projets et suivez leur avancement
            </p>

        </div>

        <div class="role-badge" id="roleInfo"></div>

    </div>

    <div class="top-actions">

        <a href="/dashboard"
           class="btn btn-dashboard btn-modern">
            <i class="fa-solid fa-arrow-left"></i>
            Dashboard
        </a>

        <button class="btn btn-danger btn-modern"
                onclick="logout()">
            <i class="fa-solid fa-right-from-bracket"></i>
            Déconnexion
        </button>

        <button id="addProjectBtn"
                class="btn btn-add btn-modern"
                onclick="showForm()">
            <i class="fa-solid fa-plus"></i>
            Nouveau Projet
        </button>

    </div>

<script>

    const role = localStorage.getItem("role");
    const token = localStorage.getItem("token");

    if(!token){
        window.location.href="/";
    }

    document.getElementById("roleInfo").innerText =
        "Connecté en tant que : " + role;

    if(role === "MEMBRE"){
        document.getElementById("addProjectBtn").style.display = "none";
    }


    fetch("/api/projects", {
        headers: {
            "Authorization": "Bearer " + token
        }
    })
        .then(response => response.json())
        .then(projects => {

            let rows = "";

            projects.forEach(project => {

                rows += `
            <tr>
                <td>${project.id}</td>
                <td>${project.titre}</td>
                <td>${project.description ?? ""}</td>
                <td>${project.dateDebut ?? ""}</td>
                <td>${project.dateFin ?? ""}</td>
                <td>

                      <a href="/tasks?projectId=${project.id}"
                          class="btn btn-info btn-sm">
                          Tâches
                      </a>

                      ${role !== "MEMBRE" ? `

                         <button class="btn btn-warning btn-sm"
                                 onclick="editProject(${project.id})">
                              Modifier
                         </button>

                         <button class="btn btn-danger btn-sm"
                                 onclick="deleteProject(${project.id})">
                              Supprimer
                         </button>

                         <button class="btn btn-secondary"
                                 onclick="downloadPdf(${project.id})">
                              PDF
                         </button>

                      ` : `
                        <span class="text-muted">
                              Lecture seule
                        </span>
                       `}

                </td>
            </tr>
            `;

            });

            document.getElementById("projectsTable").innerHTML = rows;

        });

    function showForm() {
        document.getElementById("projectForm").style.display = "block";
    }

    function addProject() {

        const token = localStorage.getItem("token");

        fetch("/api/projects", {

            method: "POST",

            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },

            body: JSON.stringify({

                titre: document.getElementById("titre").value,
                description: document.getElementById("description").value,
                dateDebut: document.getElementById("dateDebut").value,
                dateFin: document.getElementById("dateFin").value

            })

        })
            .then(async response => {

                if (response.ok) {

                    alert("Projet ajouté avec succès");
                    location.reload();

                } else {

                    const erreur = await response.text();
                    alert("Erreur : " + erreur);

                }

            });

    }

    function deleteProject(id){

        if(!confirm("Voulez-vous supprimer ce projet ?")){
            return;
        }

        const token = localStorage.getItem("token");

        fetch("/api/projects/" + id, {

            method: "DELETE",

            headers: {
                "Authorization": "Bearer " + token
            }

        })
            .then(response => {

                if(response.ok){

                    alert("Projet supprimé");
                    location.reload();

                }else{

                    alert("Erreur lors de la suppression");

                }

            });

    }

    function editProject(id){

        const token = localStorage.getItem("token");

        fetch("/api/projects/" + id, {

            headers:{
                "Authorization":"Bearer " + token
            }

        })
            .then(response => response.json())
            .then(project => {

                document.getElementById("editForm").style.display="block";

                document.getElementById("editId").value=project.id;
                document.getElementById("editTitre").value=project.titre;
                document.getElementById("editDateDebut").value=project.dateDebut;
                document.getElementById("editDateFin").value=project.dateFin;
                document.getElementById("editDescription").value=project.description;

            });

    }

    function updateProject(){

        const id = document.getElementById("editId").value;

        const token = localStorage.getItem("token");

        fetch("/api/projects/" + id, {

            method:"PUT",

            headers:{
                "Content-Type":"application/json",
                "Authorization":"Bearer " + token
            },

            body:JSON.stringify({

                titre:document.getElementById("editTitre").value,
                description:document.getElementById("editDescription").value,
                dateDebut:document.getElementById("editDateDebut").value,
                dateFin:document.getElementById("editDateFin").value

            })

        })
            .then(response => {

                if(response.ok){

                    alert("Projet modifié");
                    location.reload();

                }else{

                    alert("Erreur modification");

                }

            });

    }

    function downloadPdf(projectId){

        console.log("PDF projet :", projectId);

        fetch(`/api/reports/project/${projectId}/pdf`,{
            headers:{
                "Authorization":"Bearer " + localStorage.getItem("token")
            }
        })
            .then(response => response.blob())
            .then(blob => {

                const url = window.URL.createObjectURL(blob);

                const a = document.createElement("a");
                a.href = url;
                a.download = `rapport-projet-${projectId}.pdf`;

                document.body.appendChild(a);
                a.click();
                a.remove();
            });
    }

    function logout(){

        localStorage.clear();

        window.location.href="/";

    }

</script>

</body>
</html>
