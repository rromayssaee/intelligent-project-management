<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>IntelliPM - Création de compte</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" href="/css/register.css">
</head>

<body>

<div class="register-card">

    <div class="logo">
        📊
    </div>

    <h1 class="app-title">
        IntelliPM
    </h1>

    <p class="subtitle">
        Créez votre compte et commencez à gérer vos projets
    </p>

    <form id="registerForm">

        <div class="mb-3">

            <label class="form-label">
                Nom complet
            </label>

            <input
                    type="text"
                    id="nom"
                    class="form-control"
                    placeholder="Votre nom"
                    required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Email
            </label>

            <input
                    type="email"
                    id="email"
                    class="form-control"
                    placeholder="exemple@gmail.com"
                    required>

        </div>

        <div class="mb-4">

            <label class="form-label">
                Mot de passe
            </label>

            <input
                    type="password"
                    id="password"
                    class="form-control"
                    placeholder="Minimum 6 caractères"
                    minlength="6"
                    required>

        </div>

        <button
                type="submit"
                class="btn-register">

            Créer mon compte

        </button>

    </form>

    <a href="/"
       class="login-link">

        Déjà inscrit ? Se connecter

    </a>

</div>

<script>

    document.getElementById("registerForm")
        .addEventListener("submit", async function(e){

            e.preventDefault();

            const nom =
                document.getElementById("nom").value;

            const email =
                document.getElementById("email").value;

            const password =
                document.getElementById("password").value;

            try{

                const response =
                    await fetch(
                        "/api/auth/register",
                        {

                            method:"POST",

                            headers:{
                                "Content-Type":"application/json"
                            },

                            body:JSON.stringify({

                                nom:nom,
                                email:email,
                                password:password

                            })

                        }
                    );

                if(response.ok){

                    alert(
                        "Compte créé avec succès"
                    );

                    window.location.href="/";

                }else{

                    const error =
                        await response.text();

                    alert(
                        "Erreur : " + error
                    );

                }

            }catch(error){

                alert(
                    "Erreur de connexion au serveur"
                );

            }

        });

</script>

</body>
</html>
